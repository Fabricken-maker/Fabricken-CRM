<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma Karlsson - Fabricken CRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #141824;
            --bg-hover: #1a1f2e;
            --accent: #00d4ff;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-tertiary: #6e7681;
            --border: #2a2f3a;
            --success: #4ade80;
            --warning: #fbbf24;
            --info: #60a5fa;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
        }
        
        .nav {
            margin-bottom: 30px;
        }
        
        .nav a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav a:hover {
            text-decoration: underline;
        }
        
        .header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent) 0%, #00a8cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        
        .header-item {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
        }
        
        .chart-title {
            color: var(--accent);
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .section-title {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .project-card {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }
        
        .project-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        
        .project-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
        
        .meta-item {
            font-size: 0.9rem;
        }
        
        .meta-label {
            color: var(--text-secondary);
            display: block;
            margin-bottom: 3px;
        }
        
        .meta-value {
            font-weight: 600;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge-success { background: var(--success); color: black; }
        .badge-warning { background: var(--warning); color: black; }
        .badge-info { background: var(--info); color: black; }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 20px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            border: 2px solid var(--bg-card);
        }
        
        .timeline-date {
            color: var(--warning);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .timeline-content {
            background: var(--bg-hover);
            padding: 12px;
            border-radius: 8px;
        }
        
        .interaction-item {
            background: var(--bg-hover);
            border-left: 3px solid var(--accent);
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 6px;
        }
        
        .interaction-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .interaction-type {
            font-weight: 600;
            color: var(--accent);
        }
        
        .interaction-date {
            color: var(--text-tertiary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="nav">
        <a href="../index.html">← Tillbaka till Dashboard</a>
    </div>
    
    <div class="header">
        <h1>Emma Karlsson</h1>
        <div style='color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 10px;'>FitLife Gym</div>
        <div class="header-meta">
            <div class="header-item">📧 emma@fitlifegym.se</div>
            <div class="header-item"><span class='badge badge-success'>✅ active</span></div>
            <div class="header-item">📅 Kund sedan 2025-12-08</div>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value">0 kr</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Margin</div>
            <div class="stat-value">0.0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Ad Spend</div>
            <div class="stat-value">0 kr</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Conversions</div>
            <div class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Projekt</div>
            <div class="stat-value">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg CTR</div>
            <div class="stat-value">0.00%</div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📦 Projekt</div>

    </div>

    <script>
        Chart.defaults.color = '#9aa0a6';
        Chart.defaults.borderColor = '#2a2f3a';

    </script>
</body>
</html>
